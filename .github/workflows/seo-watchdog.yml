name: SEO watchdog

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository tests
        run: npm test

      - name: Check live SEO endpoints
        if: github.event_name != 'pull_request'
        run: node scripts/check-live-seo.mjs
